<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>S.C.I.T.T.S.E. Command Center</title>
    <style>
        /* Full Screen Reset */
        body { 
            margin: 0; padding: 0; height: 100vh;
            background-color: #0d1117; color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; overflow: hidden;
        }
        
        /* Left 30% - Data Dashboard */
        .sidebar { 
            width: 350px; min-width: 350px; 
            background-color: #161b22; 
            border-right: 2px solid #00ff00; 
            padding: 30px; display: flex; flex-direction: column;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5); z-index: 10;
        }
        
        /* Right 70% - Massive Track Map */
        .map-area { 
            flex-grow: 1; position: relative;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; background-color: #090c10;
        }
        
        canvas {
            background-color: #000000;
            border: 1px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.05);
        }

        h1 { color: #ffffff; font-size: 24px; margin-top: 0; border-bottom: 1px solid #00ff00; padding-bottom: 10px;}
        .metric { font-size: 18px; margin: 15px 0; border-bottom: 1px solid #333; padding-bottom: 5px;}
        .value { color: #ffffff; font-weight: bold; float: right; }
        #status { margin-bottom: 30px; font-weight: bold; font-size: 14px;}
        .highlight { color: #ffeb3b; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>S.C.I.T.T.S.E.</h1>
        <div id="status">Status: WAITING FOR LINK 🟡</div>

        <div class="metric">Lap: <span class="value highlight" id="lap">0</span></div>
        <div class="metric">Location: <span class="value highlight" id="turn">Straight</span></div>
        <div class="metric">Speed: <span class="value" id="speed">0 km/h</span></div>
        <div class="metric">RPM: <span class="value" id="rpm">0</span></div>
        <div class="metric">Gear: <span class="value" id="gear">0</span></div>
        <div class="metric">Throttle: <span class="value" id="throttle">0 %</span></div>
        <div class="metric">Brake: <span class="value" id="brake">0 %</span></div>
        <div class="metric">G-Force: <span class="value highlight" id="gforce">0.00 G</span></div>
        <div class="metric">Inference: <span class="value" id="infStatus">OFFLINE</span></div>
        <div class="metric">Next Lap Pred: <span class="value highlight" id="nextLapPred">--</span></div>
        <div class="metric">Stint Delta: <span class="value highlight" id="stintDelta">--</span></div>
    </div>

    <div class="map-area" id="mapContainer">
        <canvas id="trackMap"></canvas>
    </div>

    <script>
        window.onload = function() {
            const canvas = document.getElementById("trackMap");
            const ctx = canvas.getContext("2d");
            const container = document.getElementById("mapContainer");
            
            // --- The "Static" Map Array ---
            const fullTrackPath = []; // This stores the track layout permanently
            let currentCarPos = { x: 0, y: 0 };

            // Dynamic Canvas Resizing to fill the right panel
            function resizeCanvas() {
                canvas.width = container.clientWidth - 40;
                canvas.height = container.clientHeight - 40;
                drawMap(); // Redraw if user resizes the window
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // --- WebSocket Setup ---
            const ws = new WebSocket("ws://127.0.0.1:8000/ws/telemetry");
            const inferenceWs = new WebSocket("ws://127.0.0.1:8001/ws/predict/tire-degradation");
            let lastInferenceSend = 0;
            let latestLapForInference = 1;

            inferenceWs.onopen = function() {
                document.getElementById("infStatus").innerText = "ONLINE";
                document.getElementById("infStatus").style.color = "#00ff00";
            };

            inferenceWs.onmessage = function(event) {
                const result = JSON.parse(event.data);
                if (!result || !result.projection || result.projection.length === 0) {
                    return;
                }

                const nextLap = result.projection[0];
                const stintDelta = result.summary && typeof result.summary.stint_time_delta_s === "number"
                    ? result.summary.stint_time_delta_s
                    : 0;

                document.getElementById("nextLapPred").innerText = nextLap.predicted_lap_time_s.toFixed(3) + " s";
                document.getElementById("stintDelta").innerText = stintDelta.toFixed(3) + " s";
            };

            inferenceWs.onclose = function() {
                document.getElementById("infStatus").innerText = "OFFLINE";
                document.getElementById("infStatus").style.color = "#ff0000";
            };
            
            ws.onopen = function() {
                document.getElementById("status").innerHTML = "Status: LINK ESTABLISHED 🟢";
                document.getElementById("status").style.color = "#00ff00";
            };

            ws.onmessage = function(event) {
                const telemetry = JSON.parse(event.data);
                latestLapForInference = Math.max(1, telemetry.lap || 1);
                
                // 1. Update Text Dashboard
                document.getElementById("lap").innerText = telemetry.lap;
                document.getElementById("turn").innerText = telemetry.turn === "Straight" ? "Straight" : "Turn " + telemetry.turn;
                document.getElementById("speed").innerText = telemetry.speed + " km/h";
                document.getElementById("rpm").innerText = telemetry.rpm;
                document.getElementById("gear").innerText = telemetry.gear;
                document.getElementById("throttle").innerText = telemetry.throttle + " %";
                document.getElementById("brake").innerText = telemetry.brake + " %";
                document.getElementById("gforce").innerText = telemetry.g_force + " G";

                // 2. Aspect Ratio Math (The Bug Fix)
                const PADDING = 30;
                const usableWidth = canvas.width - (PADDING * 2);
                const usableHeight = canvas.height - (PADDING * 2);
                
                // Find the smaller dimension to prevent stretching
                const maxDrawArea = Math.min(usableWidth, usableHeight);
                
                // Center the map in the canvas
                const offsetX = (canvas.width - maxDrawArea) / 2;
                const offsetY = (canvas.height - maxDrawArea) / 2;

                const screenX = offsetX + (telemetry.x * maxDrawArea);
                const screenY = offsetY + ((1.0 - telemetry.y) * maxDrawArea);

                currentCarPos = { x: screenX, y: screenY };

                // Build the static track map (keep up to 10,000 points so it doesn't fade)
                fullTrackPath.push(currentCarPos);
                if (fullTrackPath.length > 10000) fullTrackPath.shift();

                // 3. Render
                drawMap();

                const now = Date.now();
                if (inferenceWs.readyState === WebSocket.OPEN && (now - lastInferenceSend) > 1000) {
                    const inferencePayload = {
                        tyre_life: latestLapForInference,
                        compound: "MEDIUM",
                        lap_number: latestLapForInference,
                        stint_laps_ahead: 6,
                        circuit: "Great Britain",
                        fresh_tyre: 0,
                        track_temp: 32.0,
                        air_temp: 24.0,
                        humidity: 45.0,
                        pressure: 1013.0,
                        wind_speed: 3.0,
                        total_race_laps: 52,
                        year: 2024
                    };
                    inferenceWs.send(JSON.stringify(inferencePayload));
                    lastInferenceSend = now;
                }
            };

            function drawMap() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (fullTrackPath.length === 0) return;

                // Draw the Permanent Static Track (Dark Gray)
                ctx.beginPath();
                ctx.strokeStyle = "#333333"; 
                ctx.lineWidth = 6;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.moveTo(fullTrackPath[0].x, fullTrackPath[0].y);
                
                for (let i = 1; i < fullTrackPath.length; i++) {
                    ctx.lineTo(fullTrackPath[i].x, fullTrackPath[i].y);
                }
                ctx.stroke();

                // Draw the Car (Bright Red Dot)
                ctx.beginPath();
                ctx.arc(currentCarPos.x, currentCarPos.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = "#ff0000";
                ctx.fill();
                
                // Draw a glow around the car
                ctx.beginPath();
                ctx.arc(currentCarPos.x, currentCarPos.y, 12, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 0, 0, 0.3)";
                ctx.fill();
            }

            ws.onclose = function() {
                document.getElementById("status").innerHTML = "Status: LINK LOST 🔴";
                document.getElementById("status").style.color = "#ff0000";
            };
        };
    </script>
</body>
</html>
